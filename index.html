<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGC New Life Chinese Teachers Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --mgc-gold: #d4af37; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: white;
            scroll-behavior: smooth;
        }
        .header-font { font-family: 'Cinzel', serif; }
        
        /* Large Card Design */
        .big-card {
            background: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            margin-bottom: 24px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* The Selfie Container */
        .photo-area {
            width: 100%;
            aspect-ratio: 4 / 5; /* Large Portrait Aspect */
            background: #111;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stamped-border { border: 3px solid var(--mgc-gold); }

        .progress-container {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="pb-10">

    <div class="progress-container p-4 border-b border-white/10">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-1">
                <span class="header-font text-[--mgc-gold] text-sm tracking-widest">Progress</span>
                <span id="progress-text" class="text-xs font-bold">0 / 10 Captured</span>
            </div>
            <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-[--mgc-gold] h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <header class="text-center my-8 px-4">
        <h1 class="header-font text-3xl text-[--mgc-gold]">MGC New Life</h1>
        <h2 class="text-sm tracking-[0.3em] uppercase opacity-60">Teacher Selfie Bingo</h2>
    </header>

    <main class="max-w-md mx-auto px-4">
        <script>
            const prompts = [
                { text: "Is single", icon: "💎" },
                { text: "Teaching 10+ years", icon: "📜" },
                { text: "Has a pet", icon: "🐈" },
                { text: "Plays an instrument", icon: "🎻" },
                { text: "Loves Chinese food", icon: "🥟" },
                { text: "Has not had a PTC yet", icon: "🚫" },
                { text: "Traveled to 5+ countries", icon: "✈️" },
                { text: "Enjoys shopping", icon: "🛍️" },
                { text: "Speaks 4+ languages", icon: "🌏" },
                { text: "Enjoys a few sports", icon: "🏀" }
            ];

            let count = 0;

            document.write(prompts.map((p, i) => `
                <div id="card-${i}" class="big-card">
                    <div class="photo-area" id="photo-area-${i}">
                        <div id="placeholder-${i}" class="text-center p-6">
                            <div class="text-5xl mb-4 opacity-40">${p.icon}</div>
                            <p class="text-lg font-semibold mb-2">${p.text}</p>
                            <p class="text-xs text-gray-500">Find the teacher to unlock this photo</p>
                        </div>
                        <img id="img-${i}" class="hidden w-full h-full object-cover">
                        
                        <div id="overlay-${i}" class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent hidden">
                            <div class="absolute bottom-6 left-6">
                                <span class="text-[--mgc-gold] text-[10px] font-bold uppercase tracking-widest">${p.text}</span>
                                <h3 id="display-name-${i}" class="text-2xl font-bold text-white"></h3>
                            </div>
                        </div>
                    </div>

                    <div id="input-block-${i}" class="p-6 bg-[#222]">
                        <input type="text" id="name-${i}" placeholder="Enter Teacher's Name" 
                            class="w-full bg-black/40 border border-white/20 rounded-xl py-3 px-4 text-sm mb-4 focus:outline-none focus:border-[--mgc-gold] transition-all">
                        <button onclick="triggerCapture(${i})" class="w-full bg-[--mgc-gold] text-black font-bold py-3 rounded-xl uppercase tracking-widest text-xs">
                            Snap Selfie
                        </button>
                    </div>
                    
                    <input type="file" id="file-${i}" accept="image/*" capture="user" class="hidden" onchange="handleFile(this, ${i})">
                </div>
            `).join(''));

            function triggerCapture(i) {
                const name = document.getElementById(`name-${i}`).value;
                if (!name.trim()) {
                    alert("⚠️ Please type the teacher's name first!");
                    return;
                }
                document.getElementById(`file-${i}`).click();
            }

            function handleFile(input, i) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        // Update UI
                        document.getElementById(`img-${i}`).src = e.target.result;
                        document.getElementById(`img-${i}`).classList.remove('hidden');
                        document.getElementById(`display-name-${i}`).innerText = document.getElementById(`name-${i}`).value;
                        document.getElementById(`overlay-${i}`).classList.remove('hidden');
                        document.getElementById(`placeholder-${i}`).classList.add('hidden');
                        document.getElementById(`input-block-${i}`).classList.add('hidden');
                        document.getElementById(`card-${i}`).classList.add('stamped-border');
                        
                        // Update Progress
                        count++;
                        document.getElementById('progress-bar').style.width = (count * 10) + '%';
                        document.getElementById('progress-text').innerText = count + ' / 10 Captured';
                        
                        if(count === 10) alert("🎊 BINGO! You've captured all 10!");
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>
    </main>

    <footer class="text-center py-10 opacity-30 text-[10px] tracking-[0.3em]">
        MGC NEW LIFE CHRISTIAN ACADEMY
    </footer>

</body>
</html>
