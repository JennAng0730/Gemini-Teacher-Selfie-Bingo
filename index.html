<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGC New Life Chinese Teachers Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100-vh;
        }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .stamped {
            border: 3px solid #4ade80 !important;
            transform: scale(0.98);
        }
        .overlay-text {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        .input-active {
            border: 2px solid #a855f7 !important;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
    </style>
</head>
<body class="text-white p-4">

    <div class="text-center mb-6 pt-4">
        <h1 class="text-2xl font-800 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-red-500 to-pink-500 uppercase">
            MGC New Life
        </h1>
        <h2 class="text-xl font-bold text-white mb-2">Chinese Teachers Bingo</h2>
        <div class="h-1 w-20 bg-red-500 mx-auto rounded-full"></div>
    </div>

    <p class="text-center text-xs text-gray-400 mb-6 italic">
        Find a teacher, type their name, and snap a selfie to stamp!
    </p>

    <div class="bingo-grid max-w-md mx-auto">
        
        <script>
            const categories = [
                { label: "Still Single", emoji: "💔", color: "border-purple-500" },
                { label: "Teaches 10+ Years", emoji: "👨‍🏫", color: "border-blue-500" },
                { label: "Has a Pet", emoji: "🐾", color: "border-green-500" },
                { label: "Plays Instrument", emoji: "🎸", color: "border-yellow-500" },
                { label: "Loves Chinese Food", emoji: "🥢", color: "border-red-500" },
                { label: "Never had PTC yet", emoji: "🎫", color: "border-orange-500" }
            ];

            document.write(categories.map((cat, index) => `
                <div id="card-${index}" class="glass-card relative rounded-2xl overflow-hidden aspect-[3/4] flex flex-col items-center justify-center p-3 text-center border-b-4 ${cat.color}">
                    <div id="content-${index}" class="z-10 flex flex-col items-center">
                        <span class="text-3xl mb-2">${cat.emoji}</span>
                        <h3 class="text-[13px] font-semibold leading-tight mb-3">${cat.label}</h3>
                        <input type="text" id="name-${index}" placeholder="Teacher's Name" 
                            class="w-full bg-black/40 border border-white/20 rounded-lg px-2 py-1 text-[11px] focus:outline-none focus:border-white text-center mb-2"
                            onclick="event.stopPropagation()">
                        <button onclick="triggerCapture(${index})" class="bg-white text-black text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                            Snap Selfie
                        </button>
                    </div>

                    <input type="file" id="file-${index}" accept="image/*" capture="user" class="hidden" onchange="handleFile(this, ${index})">
                    
                    <div id="preview-${index}" class="absolute inset-0 hidden">
                        <img id="img-${index}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 left-0 right-0 p-2 overlay-text text-left">
                            <p class="text-[9px] text-yellow-400 font-bold uppercase">${cat.label}</p>
                            <p id="display-name-${index}" class="text-[12px] font-bold truncate"></p>
                        </div>
                        <div class="absolute top-2 right-2 bg-green-500 rounded-full p-1 shadow-lg">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                </div>
            `).join(''));

            function triggerCapture(index) {
                const nameInput = document.getElementById(`name-${index}`);
                if (!nameInput.value.trim()) {
                    alert("Please type the teacher's name first!");
                    nameInput.classList.add('input-active');
                    return;
                }
                document.getElementById(`file-${index}`).click();
            }

            function handleFile(input, index) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    const nameValue = document.getElementById(`name-${index}`).value;
                    
                    reader.onload = function(e) {
                        // Set image
                        document.getElementById(`img-${index}`).src = e.target.result;
                        // Set Display Name
                        document.getElementById(`display-name-${index}`).innerText = nameValue;
                        // Switch UI
                        document.getElementById(`content-${index}`).classList.add('hidden');
                        document.getElementById(`preview-${index}`).classList.remove('hidden');
                        document.getElementById(`card-${index}`).classList.add('stamped');
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>
    </div>

    <div class="mt-8 text-center">
        <p class="text-[10px] text-gray-500 uppercase tracking-widest">© 2026 MGC New Life Activity</p>
    </div>

</body>
</html>
