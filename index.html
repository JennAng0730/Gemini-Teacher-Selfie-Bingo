<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGC New Life Chinese Teachers Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mgc-red: #9e1b1b;
            --mgc-gold: #d4af37;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #2d0a0a 0%, #050505 100%);
            min-height: 100vh;
            color: white;
        }
        .header-font { font-family: 'Cinzel', serif; }
        
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stamped {
            border: 2px solid var(--mgc-gold) !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .category-label {
            font-size: 0.7rem;
            letter-spacing: 0.05rem;
            line-height: 1.2;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .snap-btn {
            background: linear-gradient(135deg, var(--mgc-gold), #f9e29c);
            color: #2d0a0a;
            font-weight: 700;
            transition: transform 0.2s;
        }

        .snap-btn:active { transform: scale(0.9); }

        .overlay-gradient {
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
    </style>
</head>
<body class="p-5">

    <header class="text-center mb-10 mt-4">
        <h1 class="header-font text-3xl text-[--mgc-gold] mb-1">MGC New Life</h1>
        <div class="flex items-center justify-center gap-4 mb-2">
            <div class="h-[1px] w-12 bg-[--mgc-gold]"></div>
            <h2 class="text-lg font-light tracking-[0.2em] uppercase">Bingo Challenge</h2>
            <div class="h-[1px] w-12 bg-[--mgc-gold]"></div>
        </div>
        <p class="text-[10px] text-gray-400">Capture a selfie with a teacher who fits the description</p>
    </header>

    <div class="bingo-grid max-w-md mx-auto mb-12">
        <script>
            const prompts = [
                { text: "Is single", icon: "💎" },
                { text: "Teaching 10+ years", icon: "📜" },
                { text: "Has a pet", icon: "🐈" },
                { text: "Plays an instrument", icon: "🎻" },
                { text: "Loves Chinese food", icon: "🥟" },
                { text: "No PTC yet", icon: "🚫" },
                { text: "Traveled 5+ countries", icon: "✈️" },
                { text: "Enjoys shopping", icon: "🛍️" },
                { text: "Speaks 4+ languages", icon: "🌏" },
                { text: "Enjoys sports", icon: "🏀" }
            ];

            document.write(prompts.map((p, i) => `
                <div id="card-${i}" class="glass-card relative aspect-[3/4] overflow-hidden flex flex-col items-center justify-between p-4 group">
                    <div id="ui-${i}" class="z-10 w-full h-full flex flex-col items-center justify-center">
                        <div class="text-3xl mb-3 opacity-80 group-hover:scale-110 transition-transform">${p.icon}</div>
                        <p class="category-label font-semibold text-gray-200 mb-4">${p.text}</p>
                        
                        <input type="text" id="name-${i}" placeholder="Name here..." 
                            class="w-full bg-white/5 border border-white/10 rounded-md py-2 px-2 text-[11px] mb-3 focus:outline-none focus:border-[--mgc-gold] text-center transition-all">
                        
                        <button onclick="triggerCapture(${i})" class="snap-btn w-full py-2 rounded-md text-[10px] uppercase tracking-tighter">
                            Capture
                        </button>
                    </div>

                    <input type="file" id="file-${i}" accept="image/*" capture="user" class="hidden" onchange="handleFile(this, ${i})">
                    
                    <div id="preview-${i}" class="absolute inset-0 hidden">
                        <img id="img-${i}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 overlay-gradient"></div>
                        <div class="absolute bottom-3 left-3 text-left">
                            <p class="text-[8px] text-[--mgc-gold] font-bold uppercase tracking-widest mb-1">${p.text}</p>
                            <p id="display-name-${i}" class="text-sm font-bold text-white"></p>
                        </div>
                        <div class="absolute top-3 right-3 bg-[--mgc-gold] rounded-full p-1 shadow-xl">
                            <svg class="w-3 h-3 text-[#2d0a0a]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                </div>
            `).join(''));

            function triggerCapture(i) {
                const name = document.getElementById(`name-${i}`).value;
                if (!name.trim()) {
                    alert("Please enter the teacher's name first!");
                    return;
                }
                document.getElementById(`file-${i}`).click();
            }

            function handleFile(input, i) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById(`img-${i}`).src = e.target.result;
                        document.getElementById(`display-name-${i}`).innerText = document.getElementById(`name-${i}`).value;
                        document.getElementById(`ui-${i}`).style.display = 'none';
                        document.getElementById(`preview-${i}`).classList.remove('hidden');
                        document.getElementById(`card-${i}`).classList.add('stamped');
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>
    </div>

    <footer class="text-center pb-10 opacity-40">
        <p class="text-[9px] tracking-widest font-light">MGC NEW LIFE CHRISTIAN ACADEMY • 2026</p>
    </footer>

</body>
</html>
