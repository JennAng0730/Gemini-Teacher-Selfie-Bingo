<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Selfie Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card-square {
            aspect-ratio: 1 / 1.2;
            perspective: 1000px;
        }
        .captured-img {
            object-fit: cover;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-5 flex flex-col items-center">

    <header class="text-center mb-8">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark-Light.png" alt="GitHub" class="w-12 mx-auto mb-2">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
            Octo-Selfie Bingo
        </h1>
        <p class="text-gray-400 text-sm mt-2">Find someone for each category & snap a selfie!</p>
    </header>

    <div class="bingo-grid w-full max-w-md">
        
        <label class="card-square bg-gray-800 border-2 border-dashed border-purple-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Still Single</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">💔</div>
        </label>

        <label class="card-square bg-gray-800 border-2 border-dashed border-blue-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Teaches 10+ Years</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">👨‍🏫</div>
        </label>

        <label class="card-square bg-gray-800 border-2 border-dashed border-green-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Has a Pet</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">🐾</div>
        </label>

        <label class="card-square bg-gray-800 border-2 border-dashed border-yellow-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Plays Instrument</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">🎸</div>
        </label>

        <label class="card-square bg-gray-800 border-2 border-dashed border-red-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Loves Chinese Food</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">🥢</div>
        </label>

        <label class="card-square bg-gray-800 border-2 border-dashed border-orange-500 rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer hover:bg-gray-700 transition relative overflow-hidden">
            <span class="text-sm font-semibold mb-2">Never had PTC yet</span>
            <input type="file" accept="image/*" capture="user" class="hidden" onchange="previewImage(this)">
            <div class="text-3xl">🎫</div>
        </label>

    </div>

    <footer class="mt-10 text-gray-500 text-xs italic">
        *Selfies are stored locally on your browser.
    </footer>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const parent = input.parentElement;
                
                reader.onload = function(e) {
                    // Create image preview
                    let img = parent.querySelector('.captured-img');
                    if (!img) {
                        img = document.createElement('img');
                        img.className = 'captured-img absolute inset-0 z-10';
                        parent.appendChild(img);
                        
                        // Add "Stamped" badge
                        const badge = document.createElement('div');
                        badge.innerHTML = '✅ STAMPED';
                        badge.className = 'absolute bottom-2 right-2 bg-green-600 text-[10px] font-bold px-2 py-1 rounded z-20';
                        parent.appendChild(badge);
                    }
                    img.src = e.target.result;
                    parent.classList.add('border-solid', 'border-green-500');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
